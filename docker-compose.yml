services:
  ai-hos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    restart: always
    env_file:
      - .env
    environment:
      - AUTH_TRUST_HOST=true
      - REDIS_URL=redis://redis:6379
      - WORKER_MODE=separate
    labels:
      - traefik.enable=true
      - traefik.http.routers.aihos.rule=Host(`app.ainewworld.in`)
      - traefik.http.routers.aihos.tls=true
      - traefik.http.routers.aihos.entrypoints=web,websecure
      - traefik.http.services.aihos.loadbalancer.server.port=3000
    networks:
      - n8n_default

  ai-hos-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - n8n_default

  bullboard:
    image: deadly0/bull-board:latest
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    labels:
      - traefik.enable=true
      - traefik.http.routers.bullboard.rule=Host(`jobs.ainewworld.in`)
      - traefik.http.routers.bullboard.tls=true
      - traefik.http.routers.bullboard.entrypoints=web,websecure
      - traefik.http.routers.bullboard.middlewares=bullboard-auth
      - traefik.http.middlewares.bullboard-auth.basicauth.users=admin:$$2b$$12$$2HuikdtTaG3ZyrvoeKAoge/AVFpPopDf6SqxP7P52cg24ksv7dDF.
      - traefik.http.services.bullboard.loadbalancer.server.port=3000
    networks:
      - n8n_default

networks:
  n8n_default:
    external: true
